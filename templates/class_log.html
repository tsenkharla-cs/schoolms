{% extends "base.html" %}
{% block content %}
<h2>Class Log Book</h2>

<form method="POST">
    <div class="row">
        <div class="col-md-3">
            <label><b>Date</b></label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label><b>Learning Experience</b></label>
            <select name="period" class="form-select">
				<option>Select LE</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
				<option>4</option>
				<option>5</option>
				<option>6</option>
				<option>7</option>
				<option>8</option>
            </select>
        </div>
        <div class="col-md-3">
            <label><b>Class</b></label>
            <select name="class_name" id="classSelect" class="form-select" onchange="loadStudents()" required>
                <option value="">Select Class</option>
                {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label><b>Section</b></label>
            <select name="section" id="sectionSelect" class="form-select" onchange="loadStudents()" required>
                <option value="">Select Section</option>
                {% for s in sections %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-md-6">
            <label><b>Domain</b></label>
            <select name="subject" class="form-select">
				<option value="">Select Domain</option>
                {% for sub in subjects %}<option value="{{ sub }}">{{ sub }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label><b>Domain Teacher Name</b></label>
            <input type="text" name="teacher" class="form-control" required>
        </div>
    </div>

    <div class="mt-4">
        <h5>Student Attendance</h5>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentList">
                <tr><td colspan="2" class="text-center text-muted">Select Class & Section to load students</td></tr>
            </tbody>
        </table>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="markAllPresent()">Mark All Present</button>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-success">Save Attendance</button>
    </div>
</form>

<script>
function loadStudents() {
    const classVal = document.getElementById('classSelect').value;
    const sectionVal = document.getElementById('sectionSelect').value;
    const tbody = document.getElementById('studentList');
    
    console.log('Class:', classVal, 'Section:', sectionVal);
    
    if(!classVal || !sectionVal) {
        tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">Select Class & Section to load students</td></tr>';
        return;
    }

    fetch(`/api/tcs/students?class=${classVal}&section=${sectionVal}`)
        .then(response => {
            console.log('Response status:', response.status);
            
            // Check if response is JSON
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                return response.text().then(text => {
                    throw new Error('Server returned HTML instead of JSON. Please login first.');
                });
            }
            
            if (!response.ok) {
                return response.json().then(data => {
                    if (data.error && data.error.includes('login')) {
                        window.location.href = '/tcs/login';
                        throw new Error('Please login to access this page');
                    }
                    throw new Error(data.error || `HTTP error! status: ${response.status}`);
                });
            }
            
            return response.json();
        })
        .then(data => {
            console.log('Students data:', data);
            let html = '';
            if(data.length === 0) {
                html = '<tr><td colspan="2" class="text-center text-muted">No students found</td></tr>';
            } else {
                data.forEach(student => {
                    html += `
                        <tr>
                            <td>${student.name}</td>
                            <td>
                                <select name="student_${student.id}" class="form-select form-select-sm">
                                    <option value="Present">Present</option>
                                    <option value="Absent">Absent</option>
                                    <option value="Leave">Leave</option>
                                    <option value="Sick">Sick</option>
                                    <option value="Hospital">Hospital Visit</option>
									<option value="School">School Work</option>
									<option value="information">No information</option>
									<option value="NA">NA</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });
            }
            tbody.innerHTML = html;
        })
        .catch(error => {
            console.error('Error fetching students:', error);
            tbody.innerHTML = `
                <tr>
                    <td colspan="2" class="text-center text-danger">
                        Error: ${error.message}
                    </td>
                </tr>
            `;
        });
}
</script>
{% endblock %}
